function wdf(off){const n=new Date(),dy=n.getDay(),m=new Date(n);m.setDate(n.getDate()-((dy+6)%7)+off*7);return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});}

// Sanitize data from Firebase - ensures valid structure
function sanitize(raw){
  if(!raw||typeof raw!=="object") return mkEmpty();
  return {
    tasks:(raw.tasks&&typeof raw.tasks==="object")?raw.tasks:{},
    lA:typeof raw.lA==="number"?raw.lA:0,
    lB:typeof raw.lB==="number"?raw.lB:0,
    offWed:!!raw.offWed, offThu:!!raw.offThu, bed:!!raw.bed, away:!!raw.away,
    notes:Array.isArray(raw.notes)?raw.notes:[],
    customTasks:Array.isArray(raw.customTasks)?raw.customTasks:[],
    specialTasks:Array.isArray(raw.specialTasks)?raw.specialTasks:[],
  };
}
function mkEmpty(){return{tasks:{},lA:0,lB:0,offWed:false,offThu:false,bed:false,notes:[],away:false,customTasks:[],specialTasks:[]};}

function buildTasks(dow,lA,lB,isOff){
  let d=DAILY.map(t=>({...t})),w=(WEEKLY[dow]||[]).map(t=>({...t}));
  const cr=lA>=2&&lB>=2;
  if(cr){d=d.filter(t=>["a-counter","a-dishes","a-sink","b-trash-check","b-trash-empty"].includes(t.id));return{daily:d,weekly:[],crisis:true};}
  if(dow===4&&isOff)w=w.map(t=>({...t,who:"Anna",note:"Anna übernimmt (Office)"}));
  [["Anna",lA],["Max",lB]].forEach(([p,lv])=>{
    if(lv===1)w=w.map(t=>t.who===p?{...t,optional:true,note:"Optional (Level 1)"}:t);
    else if(lv===2){d=d.map(t=>t.who===p?{...t,optional:true,note:"Mini oder nichts"}:t);w=w.map(t=>t.who===p?{...t,skipped:true,note:"Übersprungen (Level 2)"}:t);}
    else if(lv===3){d=d.map(t=>t.who===p?{...t,skipped:true,note:"Ausfall"}:t);w=w.map(t=>t.who===p?{...t,skipped:true,note:"Ausfall"}:t);}
  });return{daily:d,weekly:w,crisis:false};
}

function getCarry(sel,st){
  const res=[],seen=new Set();
  for(let i=1;i<=7;i++){
    const p=new Date(sel);p.setDate(sel.getDate()-i);const pk=dk(p),pd=st[pk];
    if(!pd||pd.away)continue;
    const pdow=p.getDay(),io=pdow===2||(pdow===3&&pd.offWed)||(pdow===4&&pd.offThu);
    const{weekly}=buildTasks(pdow,pd.lA||0,pd.lB||0,io);
    for(const t of weekly){if(t.skipped||seen.has(t.id))continue;let done=false;
      for(let j=0;j<=i;j++){const cd=new Date(p);cd.setDate(p.getDate()+j);const c=st[dk(cd)];if(c&&c.tasks&&c.tasks[t.id]&&c.tasks[t.id].done){done=true;break;}}
      if(!done){seen.add(t.id);res.push({...t,note:`⏩ von ${DF[pdow]}`,isCarryover:true,cat:"Mitgezogen"});}}
  }return res;
}

// ══════ STORAGE with error recovery ══════
function useStore(){
  const[store,setStore]=useState({});
  const[rot,setRot]=useState({});
  const[ready,setReady]=useState(false);
  const[err,setErr]=useState(null);
  const subs=useRef(new Set());
  const fb=!!db;

  useEffect(()=>{
    if(!fb){setReady(true);return;}
    try{
      const ref=db.ref("rotation");
      ref.on("value",s=>{try{setRot(s.val()||{});}catch(e){console.error("rot parse:",e);setRot({});}},e=>{console.error("rot err:",e);setRot({});});
      return()=>ref.off();
    }catch(e){console.error("rot init:",e);setReady(true);}
  },[]);

  const sub=useCallback(keys=>{
    if(!fb){
      try{const d=JSON.parse(localStorage.getItem("hh_data"))||{};const c={};keys.forEach(k=>{c[k]=sanitize(d[k]);});setStore(p=>({...p,...c}));}catch{}
      setReady(true);return;
    }
    keys.forEach(k=>{
      if(subs.current.has(k))return;
      subs.current.add(k);
      try{
        db.ref("days/"+k).on("value",s=>{
          try{const v=s.val();setStore(p=>({...p,[k]:sanitize(v)}));}
          catch(e){console.error("day parse "+k+":",e);setStore(p=>({...p,[k]:mkEmpty()}));}
        },e=>{console.error("day err "+k+":",e);setStore(p=>({...p,[k]:mkEmpty()}));});
      }catch(e){console.error("sub err "+k+":",e);}
    });
    setReady(true);
  },[]);

  const saveDay=useCallback((k,data)=>{
    const safe=sanitize(data);
    setStore(p=>{const n={...p,[k]:safe};if(!fb){try{const all={};Object.keys(n).forEach(key=>{all[key]=n[key];});localStorage.setItem("hh_data",JSON.stringify(all));}catch{}}return n;});
    if(fb){try{db.ref("days/"+k).set(safe);}catch(e){console.error("save err:",e);setErr("Speichern fehlgeschlagen");setTimeout(()=>setErr(null),3000);}}
  },[]);

  const saveRot=useCallback(data=>{
    setRot(data);
    if(fb){try{db.ref("rotation").set(data);}catch(e){console.error("rot save:",e);}}
    else{try{localStorage.setItem("hh_rot",JSON.stringify(data));}catch{}}
  },[]);

  useEffect(()=>()=>{if(fb)subs.current.forEach(k=>{try{db.ref("days/"+k).off();}catch{}});},[]);
  return{store,rot,ready,sub,saveDay,saveRot,synced:fb,err};
}

  return<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,pointerEvents:"none",zIndex:999,overflow:"hidden"}}>{p.map(x=><div key={x.id} style={{position:"absolute",top:-20,left:x.l+"%",fontSize:x.sz,animation:`confettiDrop ${x.du}s ease-in ${x.dl}s forwards`}}>{x.e}</div>)}</div>;
}

function PinScreen({onUnlock}){
  const T=useContext(ThemeCtx);const[pin,setPin]=useState("");const[err,setErr]=useState(false);
  const check=v=>{if(v.length===4){if(v===CORRECT_PIN){try{sessionStorage.setItem("hh_auth","1");}catch{}onUnlock();}else{setErr(true);setPin("");setTimeout(()=>setErr(false),600);}}};
  const tap=n=>{const nv=pin+n;setPin(nv);check(nv);};
  return(<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:28,background:T.bg,padding:24}}>
    <div style={{fontSize:48}}>🔒</div><h2 style={{fontSize:22,fontWeight:800,color:T.text}}>PIN eingeben</h2>
    <div style={{display:"flex",gap:12}}>{[0,1,2,3].map(i=><div key={i} style={{width:16,height:16,borderRadius:"50%",background:i<pin.length?T.anna:T.surfaceAlt,border:`2px solid ${i<pin.length?T.anna:T.border}`,transition:"all 0.15s",animation:err?"shake 0.4s":"none"}}/>)}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,maxWidth:240}}>
      {[1,2,3,4,5,6,7,8,9,null,0,"⌫"].map((n,i)=>n===null?<div key={i}/>:
        <button key={i} onClick={()=>{if(n==="⌫")setPin(p=>p.slice(0,-1));else if(pin.length<4)tap(String(n));}}
          style={{width:68,height:68,borderRadius:16,border:`1.5px solid ${T.border}`,background:T.surface,color:T.text,fontSize:n==="⌫"?20:24,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{n}</button>)}
    </div>
    {err&&<div style={{color:T.danger,fontSize:13,fontWeight:700}}>Falscher PIN</div>}

}

        <button onClick={()=>sv({away:!dd.away})} style={{padding:"6px 18px",borderRadius:8,border:"none",background:isAw?T.away:T.surfaceAlt,color:isAw?"#fff":T.textMuted,fontWeight:700,fontSize:13,cursor:"pointer"}}>{isAw?"Ja":"Nein"}</button>
      </div>

      {isAw&&<div style={{background:T.awayBg,border:`2px solid ${T.awayLight}`,borderRadius:16,padding:20,textAlign:"center"}}><div style={{fontSize:32}}>✈️</div><div style={{fontSize:15,fontWeight:800,color:T.away,marginTop:6}}>Nicht zuhause</div><div style={{fontSize:12,color:T.textMuted,marginTop:6}}>Alle Aufgaben pausiert. Hauptaufgaben werden mitgezogen.</div></div>}

      {!isAw&&<>
        <div style={{background:T.surface,borderRadius:16,padding:12,border:`1.5px solid ${T.border}`}}>
          <div style={{fontSize:11,fontWeight:800,color:T.textMuted,marginBottom:6}}>⚡ ENERGY LEVEL</div>
          <Lv person="Anna" level={dd.lA||0} color={T.anna} onChange={l=>sv({lA:l})}/>
          <Lv person="Max" level={dd.lB||0} color={T.max} onChange={l=>sv({lB:l})}/>
        </div>

        {crisis&&<div style={{background:T.danger+"15",border:`2px solid ${T.danger}44`,borderRadius:16,padding:18,textAlign:"center"}}><div style={{fontSize:28}}>🚨</div><div style={{fontSize:15,fontWeight:900,color:T.danger,marginTop:4}}>KRISENMODUS</div><div style={{fontSize:12,color:T.textMuted,marginTop:6}}>Nur Küche minimal + Müll sichern + 5 min Reset</div></div>}

        {(dow===3||dow===4)&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:T.warnLight,borderRadius:14,padding:"12px 16px"}}><span style={{fontSize:13,fontWeight:700,color:T.warn}}>📍 {DF[dow]} = Office?</span><button onClick={()=>{if(dow===3)sv({offWed:!dd.offWed});else sv({offThu:!dd.offThu});}} style={{padding:"6px 18px",borderRadius:8,border:"none",background:isOff?T.warn:T.surfaceAlt,color:isOff?"#fff":T.textMuted,fontWeight:700,fontSize:13,cursor:"pointer"}}>{isOff?"Ja":"Nein"}</button></div>}

        {(dow===6||dow===0)&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:T.sharedLight,borderRadius:14,padding:"12px 16px"}}><span style={{fontSize:13,fontWeight:700,color:T.shared}}>🛏️ Bettwäsche-Woche?</span><button onClick={()=>sv({bed:!dd.bed})} style={{padding:"6px 18px",borderRadius:8,border:"none",background:dd.bed?T.shared:T.surfaceAlt,color:dd.bed?"#fff":T.textMuted,fontWeight:700,fontSize:13,cursor:"pointer"}}>{dd.bed?"Ja":"Nein"}</button></div>}

        {dd.bed&&(dow===6||dow===0)&&<div style={{display:"flex",flexDirection:"column",gap:6}}><div style={{fontSize:11,fontWeight:800,color:T.shared,padding:"0 4px"}}>🛏️ BETTWÄSCHE</div><TI task={{id:"bed-a",label:"Abziehen",who:"Anna",icon:"🛏️"}} td={(dd.tasks||{})["bed-a"]} onToggle={()=>tog("bed-a")} me={me}/><TI task={{id:"bed-b",label:"Neu beziehen",who:"Max",icon:"🛏️"}} td={(dd.tasks||{})["bed-b"]} onToggle={()=>tog("bed-b")} me={me}/></div>}

        {grp.map((g,gi)=>(<div key={gi} style={{display:"flex",flexDirection:"column",gap:6}}>
          <div style={{fontSize:11,fontWeight:800,padding:"0 4px",color:g.sec==="daily"?T.textMuted:g.sec==="carry"?T.carry:g.sec==="custom"?T.anna:mc,display:"flex",alignItems:"center",gap:6}}>
            {g.sec==="daily"?"🔵":g.sec==="carry"?"⏩":g.sec==="custom"?"📌":"🟠"} {g.cat.toUpperCase()}
            {g.sec==="weekly"&&<span style={{fontSize:10,fontWeight:600,color:T.textMuted}}>(Hauptaufgabe)</span>}
            {g.sec==="carry"&&<span style={{fontSize:10,fontWeight:600,color:T.carry}}>(offen)</span>}
          </div>
          {g.tasks.map(t=><TI key={t.id} task={t} td={(dd.tasks||{})[t.id]} onToggle={()=>tog(t.id)} onDel={t.isCustom?()=>delC(parseInt(t.id.split("-")[1])):undefined} me={me}/>)}
        </div>))}

        <AddInline cats={allCats} onAdd={addC}/>
        <Special tasks={spec} dt={dd.tasks||{}} onAdd={addSp} onTog={togSp} onDel={delSp} me={me}/>
        <Timer crisis={crisis}/>
      </>}

      <Notes notes={dd.notes} me={me} onAdd={addN}/>
      <WS wd={wd} store={store}/>
      {!isAw&&<Rot rotation={rot} onDone={rD}/>}

      <div style={{textAlign:"center",padding:"24px 0 8px",fontSize:11,color:T.textMuted}}>Daily &gt; alles andere · Kein Aufholen · Kein Perfektionismus</div>
    </div>
  </div></ThemeCtx.Provider>);
}

ReactDOM.render(React.createElement(EB,null,React.createElement(App)),document.getElementById("root"));
</script>
</body>
</html>
